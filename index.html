<!DOCTYPE html>
<html>
<head>
<title>To Do List</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:50px;
}

.container{
width:300px;
margin:auto;
padding:20px;
border:1px solid black;
border-radius:10px;
}

input{
width:200px;
padding:8px;
margin:10px;
}

button{
padding:8px 12px;
}

li{
margin:5px;
text-align:left;
}
</style>

</head>

<body>

<h2>To Do List</h2>

<div class="container">

<input type="text" id="task" placeholder="Enter a task">

<button onclick="addTask()">Add Task</button>

<ul id="list"></ul>

</div>

<script>

function addTask(){

let task = document.getElementById("task").value;

if(task === ""){
alert("Enter a task");
return;
}

let li = document.createElement("li");
li.innerText = task;

document.getElementById("list").appendChild(li);

document.getElementById("task").value="";

}

</script>

</body>
</html>
